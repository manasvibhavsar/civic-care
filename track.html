<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivicCare | My Complaints</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/dashboard.css">
  <style>
    .track-main { background: #f8fafc; min-height: calc(100vh - 56px); }

    .filter-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .filter-btn {
      border: 1.5px solid #e2e8f0;
      background: #fff;
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #64748b;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn.active, .filter-btn:hover {
      border-color: #1a56db;
      color: #1a56db;
      background: #eff6ff;
    }

    .complaint-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e2e8f0;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.2s;
      cursor: pointer;
    }

    .complaint-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      border-color: #93c5fd;
      transform: translateY(-1px);
    }

    .complaint-id {
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .complaint-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: #0d1b2a;
      margin-bottom: 0.5rem;
    }

    .complaint-desc {
      font-size: 0.85rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .complaint-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .complaint-meta span { display: flex; align-items: center; gap: 0.3rem; }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .s-pending { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .s-progress { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .s-resolved { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .s-rejected { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }

    .timeline {
      position: relative;
      padding-left: 1.5rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 6px;
      bottom: 6px;
      width: 2px;
      background: #e2e8f0;
    }

    .timeline-step {
      position: relative;
      padding: 0 0 1.25rem 1rem;
    }

    .timeline-step::before {
      content: '';
      position: absolute;
      left: -21px;
      top: 5px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e2e8f0;
      border: 2px solid #fff;
    }

    .timeline-step.done::before { background: #22c55e; }
    .timeline-step.active-step::before { background: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }

    .timeline-step .ts-label { font-size: 0.85rem; font-weight: 600; color: #374151; }
    .timeline-step .ts-date { font-size: 0.75rem; color: #94a3b8; margin-top: 0.15rem; }

    /* Modal */
    .modal-content { border-radius: 18px; border: none; }
    .modal-header { border-bottom: 1px solid #f1f5f9; padding: 1.5rem; }
    .modal-body { padding: 1.5rem; }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #94a3b8;
    }

    .empty-state i { font-size: 3rem; margin-bottom: 1rem; display: block; }

    .search-wrap {
      position: relative;
      max-width: 320px;
    }

    .search-wrap i {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
    }

    .search-wrap input {
      padding-left: 2.3rem;
      border-radius: 10px;
      border: 1.5px solid #e2e8f0;
      font-size: 0.88rem;
    }

    .search-wrap input:focus {
      border-color: #1a56db;
      box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm px-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold" href="index.html" style="font-family:'Syne',sans-serif;">CivicCare</a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="fw-medium" id="navUserName">User</span>
      <a href="login.html" class="btn btn-sm btn-outline-secondary rounded-3">Logout</a>
    </div>
  </div>
</nav>

<div class="d-flex">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <ul class="nav nav-pills flex-column gap-2">
      <li class="nav-item">
        <a class="nav-link text-white" href="dashboard.html">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="complaint.html">
          <i class="bi bi-pencil-square me-2"></i>Raise Complaint
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link active">
          <i class="bi bi-list-check me-2"></i>My Complaints
        </a>
      </li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="track-main flex-grow-1 p-4">

    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
      <h4 class="fw-semibold mb-0" style="font-family:'Syne',sans-serif;">My Complaints</h4>
      <div class="d-flex gap-2 align-items-center flex-wrap">
        <div class="search-wrap">
          <i class="bi bi-search"></i>
          <input type="text" class="form-control" id="searchInput" placeholder="Search complaints..." oninput="renderComplaints()">
        </div>
        <a href="complaint.html" class="btn btn-primary btn-sm rounded-3">
          <i class="bi bi-plus-lg me-1"></i>New
        </a>
      </div>
    </div>

    <!-- Filter -->
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('Pending', this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('In Progress', this)">In Progress</button>
      <button class="filter-btn" onclick="setFilter('Resolved', this)">Resolved</button>
      <button class="filter-btn" onclick="setFilter('Rejected', this)">Rejected</button>
    </div>

    <!-- Complaints List -->
    <div id="complaintsList"></div>

  </main>
</div>

<!-- DETAIL MODAL -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <div class="text-muted" style="font-size:0.75rem;" id="modalId"></div>
          <h5 class="modal-title fw-bold mb-0" id="modalTitle" style="font-family:'Syne',sans-serif;"></h5>
        </div>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-4">
          <div class="col-md-7">
            <div class="mb-3">
              <div class="text-muted mb-1" style="font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Description</div>
              <p id="modalDesc" style="font-size:0.9rem;color:#374151;line-height:1.7;"></p>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <div class="text-muted mb-1" style="font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Category</div>
                <div id="modalCat" style="font-size:0.9rem;font-weight:500;"></div>
              </div>
              <div class="col-6">
                <div class="text-muted mb-1" style="font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Department</div>
                <div id="modalDept" style="font-size:0.9rem;font-weight:500;"></div>
              </div>
              <div class="col-6">
                <div class="text-muted mb-1" style="font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Location</div>
                <div id="modalLoc" style="font-size:0.9rem;"></div>
              </div>
              <div class="col-6">
                <div class="text-muted mb-1" style="font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Submitted</div>
                <div id="modalDate" style="font-size:0.9rem;"></div>
              </div>
            </div>
          </div>
          <div class="col-md-5">
            <div class="text-muted mb-2" style="font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Progress Timeline</div>
            <div class="timeline" id="modalTimeline"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let currentFilter = 'all';

  // Load user name
  try {
    const u = JSON.parse(localStorage.getItem('civiccare_user') || '{}');
    if (u.name) document.getElementById('navUserName').textContent = u.name;
  } catch(e) {}

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderComplaints();
  }

  function getStatusBadge(status) {
    const map = {
      'Pending': 's-pending',
      'In Progress': 's-progress',
      'Resolved': 's-resolved',
      'Rejected': 's-rejected'
    };
    const icons = {
      'Pending': 'bi-clock',
      'In Progress': 'bi-arrow-clockwise',
      'Resolved': 'bi-check-circle-fill',
      'Rejected': 'bi-x-circle'
    };
    return `<span class="status-badge ${map[status] || 's-pending'}"><i class="bi ${icons[status] || 'bi-clock'}"></i>${status}</span>`;
  }

  function getTimeline(status) {
    const steps = [
      { label: 'Complaint Submitted', key: 'submitted' },
      { label: 'Under Review', key: 'review' },
      { label: 'Assigned to Department', key: 'assigned' },
      { label: 'Work In Progress', key: 'inprogress' },
      { label: 'Resolved', key: 'resolved' }
    ];

    const progress = {
      'Pending': 1,
      'In Progress': 3,
      'Resolved': 5,
      'Rejected': 1
    };

    const doneCount = progress[status] || 1;

    return steps.map((s, i) => {
      const cls = i < doneCount ? 'done' : (i === doneCount - 1 ? 'active-step' : '');
      const date = i < doneCount ? `<div class="ts-date">${new Date(Date.now() - (doneCount - i - 1) * 86400000 * 2).toLocaleDateString('en-IN', {day:'numeric',month:'short'})}</div>` : `<div class="ts-date text-muted">Pending</div>`;
      return `<div class="timeline-step ${cls}"><div class="ts-label">${s.label}</div>${date}</div>`;
    }).join('');
  }

  function openDetail(c) {
    document.getElementById('modalId').textContent = `#${c.id}`;
    document.getElementById('modalTitle').textContent = c.category + ' — ' + c.location;
    document.getElementById('modalDesc').textContent = c.description;
    document.getElementById('modalCat').textContent = c.category;
    document.getElementById('modalDept').textContent = c.department;
    document.getElementById('modalLoc').textContent = c.location;
    document.getElementById('modalDate').textContent = new Date(c.date).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
    document.getElementById('modalTimeline').innerHTML = getTimeline(c.status);
    new bootstrap.Modal(document.getElementById('detailModal')).show();
  }

  function renderComplaints() {
    const complaints = JSON.parse(localStorage.getItem('civiccare_complaints') || '[]');
    const search = document.getElementById('searchInput').value.toLowerCase();

    let filtered = complaints.filter(c => {
      const matchFilter = currentFilter === 'all' || c.status === currentFilter;
      const matchSearch = !search || c.category.toLowerCase().includes(search) || c.location.toLowerCase().includes(search) || c.description.toLowerCase().includes(search);
      return matchFilter && matchSearch;
    });

    const container = document.getElementById('complaintsList');

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <i class="bi bi-inbox text-muted"></i>
          <h5 style="font-family:'Syne',sans-serif;color:#64748b;">No complaints found</h5>
          <p style="font-size:0.88rem;">Try adjusting your filters or <a href="complaint.html">raise a new complaint</a>.</p>
        </div>`;
      return;
    }

    container.innerHTML = filtered.map(c => `
      <div class="complaint-card" onclick='openDetail(${JSON.stringify(c)})'>
        <div class="d-flex justify-content-between align-items-start gap-2">
          <div class="flex-grow-1">
            <div class="complaint-id">#${c.id}</div>
            <div class="complaint-title">${c.category}</div>
            <div class="complaint-desc">${c.description}</div>
            <div class="complaint-meta">
              <span><i class="bi bi-geo-alt"></i>${c.location}</span>
              <span><i class="bi bi-building"></i>${c.department}</span>
              <span><i class="bi bi-calendar3"></i>${new Date(c.date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>
            </div>
          </div>
          <div class="flex-shrink-0">${getStatusBadge(c.status)}</div>
        </div>
      </div>
    `).join('');
  }

  renderComplaints();
</script>
</body>
</html>
