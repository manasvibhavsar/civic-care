<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CivicCare | Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="static/dashboard.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm px-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-semibold">CivicCare</a>

    <form class="d-none d-md-flex ms-4">
      <input class="form-control form-control-sm" placeholder="Search complaints">
    </form>

    <div class="ms-auto dropdown">
      <a class="d-flex align-items-center text-decoration-none dropdown-toggle"
         data-bs-toggle="dropdown">
        <img src="https://i.pravatar.cc/32" class="rounded-circle me-2" width="28">
        User
      </a>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item">Profile</a></li>
        <li><hr class="dropdown-divider"></li>
        <li><a class="dropdown-item text-danger">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- BODY -->
<div class="d-flex">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <ul class="nav nav-pills flex-column gap-2">
      <li class="nav-item">
        <a class="nav-link active"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="complaint.html"><i class="bi bi-pencil-square me-2"></i>Raise Complaint</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="track.html"><i class="bi bi-list-check me-2"></i>My Complaints</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="notifications.html"><i class="bi bi-bell me-2"></i>Notifications</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="profile.html"><i class="bi bi-person-circle me-2"></i>Profile</a>
      </li>
      <li class="nav-item" style="margin-top:1rem;border-top:1px solid rgba(255,255,255,0.1);padding-top:1rem;">
        <a class="nav-link text-white" href="admin.html"><i class="bi bi-shield-check me-2"></i>Admin Panel</a>
      </li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="dashboard-main flex-grow-1 p-4">

    <h4 class="fw-semibold mb-4">Welcome, User!</h4>

    <!-- TOP CARDS -->
    <div class="row g-4 mb-4">
      <div class="col-md-4">
        <div class="card stat-card bg-primary text-white">
          <div class="card-body">
            <h2 id="totalComplaints">0</h2>
            <p>My Complaints</p>
          </div>
        </div>
      </div>

      <div class="col-md-8">
        <div class="card stat-card">
          <div class="card-body d-flex align-items-center">
            <button class="btn btn-primary">
              <i class="bi bi-pencil-square me-2"></i>
              Raise a New Complaint
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="mb-3">My Recent Complaints</h5>

        <div class="table-responsive">
          <table class="table align-middle">
            <thead class="table-light">
              <tr>
                <th>ID</th>
                <th>Category</th>
                <th>Status</th>
                <th>Department</th>
                <th>Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="complaintsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="static/dashboard.js"></script>
</body>
</html>
